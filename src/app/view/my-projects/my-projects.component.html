<main class="flex flex-col gap-5">
    <h1 class="my-5 text-4xl md:text-5xl">Your <span class="text-transparent bg-clip-text bg-gradient-to-r from-dt-accent-600 to-dt-primary-600">Splatfests</span></h1>
    
    <span class="bg-dt-text-100 rounded-xl p-5 flex flex-col gap-3 min-h-80">
        
        <section class="flex justify-start">
            <button class="hover:shadow-xl shadow-dt-accent-500/30 flex gap-3 content-center"><fa-icon [icon]="['fas', 'plus']" size="lg"></fa-icon>Create from Template</button>
            <button class="bg-dt-primary-600 hover:shadow-xl shadow-dt-primary-600/30 flex gap-3 content-center"><fa-icon [icon]="['fas', 'file']" size="lg"></fa-icon>Import</button>
        </section>
        <section class="flex flex-col items-start">
            <div class="flex-1 border-4 border-team-neutral-500 bg-team-neutral-500 border-y-0  rounded-lg w-[100%] md:w-fit ">
                <section class=" flex-1 block md:max-w-sm p-6 bg-white border border-gray-200 rounded-lg shadow-sm dark:bg-dt-background-200 dark:hover:bg-dt-background-300  dark:border-dt-background-400 dark:hover:border-dt-background-500">
                    <h5 class="mb-2 text-2xl sm:text-3xl md:text-2xl font-bold tracking-tight">Name: <span class="text-transparent bg-clip-text bg-gradient-to-r from-team-alpha-600 to-team-bravo-600">Callie vs. Marie</span> </h5>
                    <span class="font-normal text-gray-700 dark:text-dt-text-800">
                        <p>Created 2 days ago</p>
                        <p>Updated 1 day ago</p>
    
                    </span>
                </section>
            </div>
        </section>

    </span>
    
    
</main>
